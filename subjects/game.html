<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../assets/images/logo.png">
    <link rel="stylesheet" href="../css/main.css">
    <title>Snake Game - Study Break - RevisionHub</title>
    <meta name="description" content="Take a study break with our interactive Snake game. Perfect for a quick mental break during revision sessions.">
</head>

<body>
    <section class="game">
   <div id="score">Score: 0</div>
    <canvas id="gameCanvas"></canvas>
    <div id="gameOver">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>
    <div class="instructions">
        <strong>Desktop:</strong> Arrow keys<br>
        <strong>Mobile:</strong> Swipe on canvas 📱<br>
        <div class="swipe-hint">Eat 📚 books to grow the glowing blue snake!</div>
    </div>

    <a href="../index.html"><button>Go Back</button></a>
        
    </section>
    <script src="../js/game.js"></script>
</body>
</html>
